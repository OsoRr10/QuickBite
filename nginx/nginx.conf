# ── QuickBite — Nginx API Gateway ─────────────────────────────────────────
#
# Arquitectura de ruteo:
#
#   Cliente (browser)
#       │
#       ▼
#   Nginx :80
#       ├── /api/restaurants/  ──►  Flask :5001  (microservicio)
#       ├── /api/              ──►  Django :8000  (monolito)
#       └── /                  ──►  Django :8000  (frontend)
#
# Patrón Estrangulador en acción: Nginx decide quién atiende cada ruta
# sin que el cliente sepa nada del cambio interno.
# ──────────────────────────────────────────────────────────────────────────

upstream django {
    server django:8000;
}

upstream restaurants_service {
    server restaurants:5001;
}

server {
    listen 80;
    server_name _;

    # ── Logs ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Timeouts y límites ─────────────────────────────────────────────────
    client_max_body_size 10M;
    proxy_read_timeout   60s;
    proxy_connect_timeout 10s;

    # ── Headers comunes ────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── MICROSERVICIO FLASK: Restaurantes ──────────────────────────────────
    # Esta regla es más específica → se evalúa primero que /api/
    location /api/restaurants/ {
        proxy_pass http://restaurants_service/restaurants/;
    }

    # ── MONOLITO DJANGO: resto de la API ──────────────────────────────────
    location /api/ {
        proxy_pass http://django;
    }

    # ── ARCHIVOS ESTÁTICOS DE DJANGO ──────────────────────────────────────
    location /static/ {
        proxy_pass http://django;
    }

    # ── ADMIN DE DJANGO ───────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://django;
    }

    # ── FRONTEND (todo lo demás) ───────────────────────────────────────────
    location / {
        proxy_pass http://django;
    }
}
