events {}

http {
    server {
        listen 80;

        # ── Microservicio Flask — Pagos (estrangulado) ──────────
        # Toda ruta /api/v2/payments/ va al nuevo microservicio
        location /api/v2/payments/ {
            proxy_pass         http://flask_payment:5000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Monolito Django — Rutas legadas ─────────────────────
        # Todo lo demás sigue yendo a Django
        location / {
            proxy_pass         http://django_web:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
