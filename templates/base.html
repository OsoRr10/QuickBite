<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}QuickBite{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #ff5733;
      --accent2: #ffb347;
      --text: #f0ede8;
      --muted: #888;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ─────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: -1px;
    }
    .logo span { color: var(--text); }
    .nav-tabs { display: flex; gap: 6px; }
    .tab-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 8px 18px; border-radius: 99px;
      cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .85rem;
      transition: all .2s;
    }
    .tab-btn:hover, .tab-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff;
    }
    .auth-area { display: flex; gap: 10px; align-items: center; font-size: .85rem; }
    #auth-status { color: var(--muted); }

    /* ── BUTTONS ─────────────────────────────── */
    .btn-sm {
      padding: 7px 16px; border-radius: 99px; border: none;
      cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .85rem;
      font-weight: 500; transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #e04520; }
    .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-full {
      width: 100%; padding: 13px; border-radius: var(--radius); border: none;
      background: var(--accent); color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; margin-top: 6px;
    }
    .btn-full:hover { background: #e04520; }
    .btn-add {
      background: var(--accent); color: #fff; border: none;
      padding: 8px 16px; border-radius: 99px; cursor: pointer;
      font-size: .82rem; font-weight: 600; font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .btn-add:hover { background: #e04520; transform: scale(1.05); }
    .btn-add:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }

    /* ── LAYOUT ──────────────────────────────── */
    main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    .section { display: none; animation: fadeIn .3s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .sec-header { margin-bottom: 28px; }
    .sec-header h2 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; }
    .sec-header p { color: var(--muted); margin-top: 4px; font-size: .9rem; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    /* ── FORM FIELDS ─────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .field input {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 12px 14px; border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif; font-size: .95rem;
      outline: none; transition: border .2s;
    }
    .field input:focus { border-color: var(--accent); }

    /* ── CARDS ───────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; transition: border-color .2s, transform .2s;
      position: relative; overflow: hidden;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-badge {
      display: inline-block; background: rgba(255,87,51,.15);
      color: var(--accent); font-size: .72rem; font-weight: 600;
      padding: 3px 10px; border-radius: 99px; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .card h3 { font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .card p { color: var(--muted); font-size: .85rem; line-height: 1.5; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
    .price { font-size: 1.2rem; font-weight: 700; color: var(--accent2); font-family: 'Syne', sans-serif; }
    .stock { font-size: .8rem; color: var(--muted); }

    /* ── RESTAURANT CARD ─────────────────────── */
    .rest-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; display: flex;
      gap: 16px; align-items: flex-start; transition: border-color .2s;
    }
    .rest-card:hover { border-color: var(--accent); }
    .rest-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .rest-info h3 { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 4px; }
    .rest-info p { color: var(--muted); font-size: .83rem; }
    .stars { color: var(--accent2); font-size: .85rem; margin-top: 4px; }

    /* ── CART ────────────────────────────────── */
    .cart-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
    @media(max-width:700px){ .cart-layout { grid-template-columns: 1fr; } }
    .cart-items-list { display: flex; flex-direction: column; gap: 10px; }
    .cart-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .cart-item-name { font-weight: 500; }
    .cart-item-meta { color: var(--muted); font-size: .83rem; margin-top: 2px; }
    .cart-item-subtotal { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent2); }

    /* ── ORDER SUMMARY ───────────────────────── */
    .order-summary {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; position: sticky; top: 90px;
    }
    .order-summary h3 { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 18px; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: .9rem; }
    .summary-row.total { font-weight: 700; font-size: 1.1rem; color: var(--accent2); border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
    .discount-input { display: flex; gap: 8px; margin: 16px 0; }
    .discount-input input {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; outline: none;
    }

    /* ── ORDER HISTORY ───────────────────────── */
    .order-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; margin-bottom: 14px;
    }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .order-id { font-family: 'Syne', sans-serif; font-weight: 700; }
    .status-badge {
      padding: 4px 12px; border-radius: 99px; font-size: .78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .status-PENDING    { background: rgba(255,179,71,.15); color: var(--accent2); }
    .status-CONFIRMED  { background: rgba(0,200,100,.15);  color: #00c864; }
    .status-CANCELLED  { background: rgba(255,87,51,.15);  color: var(--accent); }
    .status-DELIVERED  { background: rgba(100,200,255,.15); color: #64c8ff; }
    .order-items-list { font-size: .88rem; color: var(--muted); line-height: 1.8; }
    .order-total { margin-top: 12px; font-weight: 700; color: var(--accent2); font-family: 'Syne', sans-serif; }

    /* ── LOGIN CARD ──────────────────────────── */
    .login-card {
      max-width: 400px; margin: 60px auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px;
    }
    .login-card h2 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem;
      margin-bottom: 6px;
    }
    .login-card p { color: var(--muted); margin-bottom: 28px; font-size: .9rem; }

    /* ── TOAST ───────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px;
      font-size: .9rem; opacity: 0; transform: translateY(10px);
      transition: all .3s; pointer-events: none; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: #00c864; }
    .toast.error   { border-color: var(--accent); }

    /* ── EMPTY STATE ─────────────────────────── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 6px; }

    /* ── SKELETON ────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px; height: 20px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

{% load i18n %}

{% include "partials/_nav.html" %}

<main>
  {% block content %}{% endblock %}
</main>

<div class="toast" id="toast"></div>

{% block scripts %}
<script>
// ── ESTADO GLOBAL ──────────────────────────────────────────────────────────
let AUTH            = null;   // { username, password }
let CART            = [];     // [{ id, name, price, qty }]
let DISCOUNT        = 0;
let CURRENT_SECTION = 'login';

// Inyectamos el estado de autenticación desde el servidor
const SERVER_IS_AUTHENTICATED = {{ user.is_authenticated|yesno:"true,false" }};

const BASE = '/api';

// ── I18N (strings usados en JS) ───────────────────────────────────────────
const I18N = {
  login_required: "{% trans 'Debes iniciar sesión para hacer pedidos' %}",
  login_first: "{% trans 'Inicia sesión primero' %}",
  credentials_wrong: "{% trans 'Credenciales incorrectas' %}",
  fill_credentials: "{% trans 'Completa usuario y contraseña' %}",
  welcome_tpl: "{% trans 'Bienvenido, __USER__!' %}",
  added_to_cart: "{% trans 'agregado al carrito' %}",
  loading: "{% trans 'Cargando...' %}",
  discount_applied: "{% trans 'Descuento del __PCT__% aplicado' %}",
  meal_load_error: "{% trans 'No se pudo cargar la receta' %}",
  meal_offline: "{% trans 'Sin conexión con TheMealDB' %}",
  error_connect: "{% trans 'No se pudo conectar con el servidor' %}",
  cart_empty: "{% trans 'Carrito vacío' %}",
  order_created_tpl: "{% trans '✅ Orden #__ID__ creada! Total: $__TOTAL__' %}",
  not_authenticated: "{% trans 'No autenticado' %}",
  cart_is_empty: "{% trans 'El carrito está vacío' %}",
  authenticated_as: "{% trans '👤 __USER__' %}",
  ally_offline: "{% trans 'Ally: desconectado' %}",
  add: "{% trans '+ Agregar' %}",
  available: "{% trans 'disponibles' %}",
  no_restaurants: "{% trans 'Sin restaurantes' %}",
  add_restaurants_admin: "{% trans 'Agrega restaurantes desde el admin de Django' %}",
  no_products: "{% trans 'Sin productos' %}",
  add_products_admin: "{% trans 'Agrega productos desde el admin de Django' %}",
  error_loading: "{% trans 'Error al cargar' %}",
  cart_empty_title: "{% trans 'Carrito vacío' %}",
  add_from_menu: "{% trans 'Agrega productos desde el Menú' %}",
  no_orders: "{% trans 'Sin pedidos' %}",
  first_order_msg: "{% trans 'Haz tu primer pedido desde el Menú' %}",
  delete: "{% trans 'Eliminar' %}",
};

// ── AUTENTICACIÓN ──────────────────────────────────────────────────────────

function saveAuth() {
  if (!AUTH) {
    sessionStorage.removeItem('quickbiteAuth');
    localStorage.removeItem('quickbiteAuth');
    return;
  }

  const json = JSON.stringify(AUTH);
  sessionStorage.setItem('quickbiteAuth', json);
  localStorage.setItem('quickbiteAuth', json);
}

function restoreAuth() {
  try {
    const stored = sessionStorage.getItem('quickbiteAuth') || localStorage.getItem('quickbiteAuth');
    if (!stored) {
      document.getElementById('auth-status').textContent = I18N.not_authenticated;
      document.getElementById('login-btn').style.display = 'block';
      return;
    }

    AUTH = JSON.parse(stored);
    if (AUTH?.username) {
      document.getElementById('auth-status').textContent = I18N.authenticated_as.replace('__USER__', AUTH.username);
      document.getElementById('login-btn').style.display  = 'none';
      document.getElementById('logout-btn').style.display = 'block';
    }
  } catch (error) {
    console.warn('No se pudo restaurar sesión:', error);
  }
}

function saveSection() {
  if (!CURRENT_SECTION) {
    sessionStorage.removeItem('quickbiteSection');
    localStorage.removeItem('quickbiteSection');
    return;
  }

  sessionStorage.setItem('quickbiteSection', CURRENT_SECTION);
  localStorage.setItem('quickbiteSection', CURRENT_SECTION);
}

function restoreSection() {
  try {
    return sessionStorage.getItem('quickbiteSection') || localStorage.getItem('quickbiteSection');
  } catch (error) {
    console.warn('No se pudo restaurar la sección activa:', error);
    return null;
  }
}

function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (AUTH) {
    h['Authorization'] = 'Basic ' + btoa(AUTH.username + ':' + AUTH.password);
  }
  return h;
}

async function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;

  if (!u || !p) {
    toast(I18N.fill_credentials, 'error');
    return;
  }

  const res = await fetch(BASE + '/orders/', {
    headers: { 'Authorization': 'Basic ' + btoa(u + ':' + p) }
  });

  if (res.status === 401 || res.status === 403) {
    toast(I18N.credentials_wrong, 'error');
    return;
  }

  AUTH = { username: u, password: p };
  saveAuth();
  document.getElementById('auth-status').textContent = I18N.authenticated_as.replace('__USER__', u);
  document.getElementById('login-btn').style.display  = 'none';
  document.getElementById('logout-btn').style.display = 'block';
  toast(I18N.welcome_tpl.replace('__USER__', u), 'success');
  showSection('restaurants');
}

function logout() {
  AUTH = null;
  saveAuth();
  CART = [];
  document.getElementById('auth-status').textContent  = I18N.not_authenticated;
  document.getElementById('login-btn').style.display  = 'block';
  document.getElementById('logout-btn').style.display = 'none';
  updateCartCount();
  showSection('login');
}

function initializeApp() {
  restoreAuth();
  
  // Si tenemos AUTH (JS) o el servidor confirma sesión, evitamos ir a login
  let initialSection = restoreSection();
  
  if ((AUTH || SERVER_IS_AUTHENTICATED)) {
    if (!initialSection || initialSection === 'login') initialSection = 'restaurants';
  } else {
    initialSection = 'login';
  }
  
  showSection(initialSection);
  loadAllyInfo();
}

// ── NAVEGACIÓN ─────────────────────────────────────────────────────────────

function showSection(name) {
  CURRENT_SECTION = name;
  saveSection();

  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('section-' + name)?.classList.add('active');

  // Resaltar botón activo usando data-section (independiente del idioma)
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('data-section') === name) b.classList.add('active');
  });

  // Cargar datos según sección
  if (name === 'restaurants') loadRestaurants();
  if (name === 'products')    { loadProducts(); loadRandomMeal(); }
  if (name === 'cart')        renderCart();
  if (name === 'orders') {
    if (!AUTH) { toast(I18N.login_first, 'error'); showSection('login'); return; }
    loadOrders();
  }
}

// ── RESTAURANTES ───────────────────────────────────────────────────────────
// NOTA: este endpoint será servido por el microservicio Flask en la Entrega 2.
// Nginx redirigirá /api/restaurants/ → Flask service.

async function loadRestaurants() {
  const grid = document.getElementById('restaurants-grid');
  try {
    const res  = await fetch(BASE + '/restaurants/', { headers: headers() });
    const data = await res.json();

    if (!data.length) {
      grid.innerHTML = emptyState('🏪', I18N.no_restaurants, I18N.add_restaurants_admin);
      return;
    }

    grid.innerHTML = data.map(r => `
      <div class="rest-card">
        <div class="rest-icon">🍔</div>
        <div class="rest-info">
          <h3>${r.name}</h3>
          <p>${r.address}</p>
          <p>${r.phone}</p>
          <div class="stars">
            ${'★'.repeat(Math.round(r.rating))}${'☆'.repeat(5 - Math.round(r.rating))}
            ${r.rating.toFixed(1)}
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    grid.innerHTML = emptyState('⚠️', I18N.error_loading, I18N.error_connect);
  }
}

// ── PRODUCTOS ──────────────────────────────────────────────────────────────

async function loadProducts() {
  const grid = document.getElementById('products-grid');
  try {
    const res  = await fetch(BASE + '/products/', { headers: headers() });
    const data = await res.json();

    if (!data.length) {
      grid.innerHTML = emptyState('🍽', I18N.no_products, I18N.add_products_admin);
      return;
    }

    grid.innerHTML = data.map(p => `
      <div class="card">
        <div class="card-badge">${p.category?.name ?? 'Sin categoría'}</div>
        <h3>${p.name}</h3>
        <p>${p.description || p.restaurant?.name || ''}</p>
        <div class="card-footer">
          <div>
            <div class="price">$${parseFloat(p.price).toFixed(2)}</div>
            <div class="stock">${p.stock} ${I18N.available}</div>
          </div>
          <button class="btn-add"
            onclick="addToCart(${p.id}, '${p.name.replace(/'/g, "\\'")}', ${p.price})"
            ${p.stock === 0 ? 'disabled' : ''}>
            ${I18N.add}
          </button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    grid.innerHTML = emptyState('⚠️', I18N.error_loading, I18N.error_connect);
  }
}

// ── CARRITO (estado local) ─────────────────────────────────────────────────

function addToCart(id, name, price) {
  const existing = CART.find(i => i.id === id);
  if (existing) {
    existing.qty++;
  } else {
    CART.push({ id, name, price: parseFloat(price), qty: 1 });
  }
  updateCartCount();
  toast(`"${name}" ${I18N.added_to_cart} 🛒`, 'success');
}

function updateQty(idx, val) {
  CART[idx].qty = Math.max(1, parseInt(val) || 1);
  renderCart();
}

function removeFromCart(idx) {
  CART.splice(idx, 1);
  updateCartCount();
  renderCart();
}

function updateCartCount() {
  const total = CART.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = total ? `(${total})` : '';
}

function applyDiscount() {
  DISCOUNT = parseFloat(document.getElementById('discount-pct').value) || 0;
  renderCart();
  toast(I18N.discount_applied.replace('__PCT__', DISCOUNT), 'success');
}

function renderCart() {
  const container = document.getElementById('cart-items-container');

  if (!CART.length) {
    container.innerHTML = emptyState('🧺', I18N.cart_empty_title, I18N.add_from_menu);
    document.getElementById('s-subtotal').textContent = '$0';
    document.getElementById('s-total').textContent    = '$0';
    return;
  }

  const subtotal = CART.reduce((s, i) => s + i.price * i.qty, 0);
  const total    = subtotal - (subtotal * DISCOUNT / 100);

  document.getElementById('s-subtotal').textContent = `$${subtotal.toFixed(2)}`;
  document.getElementById('s-total').textContent    = `$${total.toFixed(2)}`;

  container.innerHTML = `
    <div class="cart-items-list">
      ${CART.map((item, idx) => `
        <div class="cart-item">
          <div>
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-meta">$${item.price.toFixed(2)} ${I18N.each_unit || 'c/u'}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px">
            <input
              type="number" value="${item.qty}" min="1"
              style="width:64px; background:var(--bg); border:1px solid var(--border);
                     color:var(--text); padding:6px 10px; border-radius:8px;
                     font-size:.9rem; text-align:center;"
              onchange="updateQty(${idx}, this.value)"
            />
            <div class="cart-item-subtotal">$${(item.price * item.qty).toFixed(2)}</div>
            <button
              onclick="removeFromCart(${idx})"
              style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem;"
              title="${I18N.delete}">✕</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

async function checkout() {
  if (!AUTH) {
    toast(I18N.login_required, 'error');
    showSection('login');
    return;
  }
  if (!CART.length) {
    toast(I18N.cart_is_empty, 'error');
    return;
  }

  const payload = {
    items:    CART.map(i => ({ product_id: i.id, quantity: i.qty })),
    discount: DISCOUNT,
  };

  const res  = await fetch(BASE + '/orders/create/', {
    method: 'POST',
    headers: headers(),
    body: JSON.stringify(payload),
  });
  const data = await res.json();

  if (res.status === 201) {
    CART = [];
    DISCOUNT = 0;
    updateCartCount();
    document.getElementById('discount-pct').value = '';
    const msg = I18N.order_created_tpl.replace('__ID__', data.id).replace('__TOTAL__', (data.total || 0).toFixed(2));
    toast(msg, 'success');
    showSection('orders');
  } else {
    toast(data.error || I18N.error_connect, 'error');
  }
}

// ── ÓRDENES ────────────────────────────────────────────────────────────────

async function loadOrders() {
  const container = document.getElementById('orders-container');
  try {
    const res = await fetch(BASE + '/orders/', { headers: headers() });
    if (res.status === 401) {
      toast(I18N.login_first, 'error');
      showSection('login');
      return;
    }
    const data = await res.json();

    if (!data.length) {
      container.innerHTML = emptyState('📭', I18N.no_orders, I18N.first_order_msg);
      return;
    }

    container.innerHTML = data.map(o => `
      <div class="order-card">
        <div class="order-header">
          <div class="order-id">Orden #${o.id}</div>
          <div class="status-badge status-${o.status}">${o.status}</div>
        </div>
        <div class="order-items-list">
          ${o.items.map(i => `${i.quantity}× ${i.product} — $${parseFloat(i.unit_price).toFixed(2)}`).join('<br>')}
        </div>
        <div class="order-total">${I18N.total_label}: $${o.total?.toFixed(2) ?? '—'}</div>
      </div>
    `).join('');
  } catch (e) {
    container.innerHTML = emptyState('⚠️', I18N.error_loading, I18N.error_connect);
  }
}

// ── UTILIDADES ─────────────────────────────────────────────────────────────

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast show ${type}`;
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

function emptyState(icon, title, subtitle) {
  return `
    <div class="empty">
      <div class="icon">${icon}</div>
      <h3>${title}</h3>
      <p>${subtitle}</p>
    </div>
  `;
}


// ── RECETAS (Patrón Adapter — TheMealDB) ───────────────────────────────────

async function loadRandomMeal() {
  const nameEl  = document.getElementById('meal-name');
  const metaEl  = document.getElementById('meal-meta');
  const instrEl = document.getElementById('meal-instructions');
  const thumbEl = document.getElementById('meal-thumb');
  if (!nameEl) return;

  nameEl.textContent  = I18N.loading;
  metaEl.textContent  = '';
  instrEl.textContent = '';
  thumbEl.style.display = 'none';

  try {
    const res  = await fetch('/api/meals/random/');
    const meal = await res.json();

    if (meal.error || !meal.name) {
      nameEl.textContent = I18N.meal_load_error;
      return;
    }

    nameEl.textContent  = meal.name;
    metaEl.textContent  = [meal.category, meal.origin].filter(Boolean).join(' · ');
    instrEl.textContent = meal.instructions;

    if (meal.thumbnail) {
      thumbEl.src           = meal.thumbnail;
      thumbEl.style.display = 'block';
    }
  } catch (e) {
    nameEl.textContent = I18N.meal_offline;
  }
}

// ── ALIANZA: consumo de servicio aliado y visualización en la nav ───────
async function loadAllyInfo() {
  const el = document.getElementById('ally-info');
  if (!el) return;
  try {
    const res = await fetch(BASE + '/ally/info/');
    if (!res.ok) { el.textContent = I18N.ally_offline; return; }
    const data = await res.json();

    // Intentamos leer llaves comunes que el aliado podría enviar
    const name = data.service || data.team || data.name || 'Ally';
    const status = data.status || data.state || 'Online';
    el.textContent = `🤝 ${name}: ${status}`;
  } catch (e) {
    el.textContent = I18N.ally_offline;
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', initializeApp);

</script>
