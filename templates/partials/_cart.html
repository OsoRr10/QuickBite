<div class="section" id="section-cart">
  <div class="sec-header">
    <h2>Carrito</h2>
    <p>Revisa tu pedido antes de confirmar</p>
  </div>
  <div class="cart-layout">
    <div id="cart-items-container"></div>
    <div class="order-summary">
      <h3>Resumen del pedido</h3>
      <div id="summary-content">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="s-subtotal">$0</span>
        </div>
        <div class="discount-input">
          <input type="number" id="discount-pct" placeholder="Descuento %" min="0" max="100" />
          <button class="btn-sm btn-outline" onclick="applyDiscount()">Aplicar</button>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="s-total">$0</span>
        </div>
      </div>
      <button class="btn-full" onclick="checkout()" style="margin-top:16px">Confirmar Pedido</button>
    </div>
  </div>
</div>
