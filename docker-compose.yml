version: "3.9"

services:

  # ── Monolito Django ──────────────────────────────────────
  django_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickbite_django
    volumes:
      - .:/app
    environment:
      - ENV_TYPE=DEV
    expose:
      - "8000"

  # ── Microservicio Flask (Pagos) ──────────────────────────
  flask_payment:
    build:
      context: ./flask_payment_service
      dockerfile: Dockerfile
    container_name: quickbite_payment
    expose:
      - "5000"

  # ── Nginx (enrutador de tráfico) ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: quickbite_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - django_web
      - flask_payment
